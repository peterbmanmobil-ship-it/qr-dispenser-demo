<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tork – Choose country</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <img class="brandLogo" src="tork-logo.png" alt="Tork" />
      <h1 id="title">Choose country</h1>
    </header>

    <section class="card">
      <div class="row">
        <div>
          <h2 class="h2">Country</h2>
          <p class="muted">Select your country to open the local product page.</p>
        </div>
        <div class="pill" id="productPill">Product: 564500</div>
      </div>

      <div class="field">
        <label for="marketSelect" class="label">Country</label>
        <select id="marketSelect" class="select"></select>
      </div>

      <div class="ctaRow">
        <a id="goBtn" class="primaryBtn" href="#" aria-disabled="true">Open</a>
      </div>

      <div class="divider"></div>

      <div class="actions">
        <a id="faqLink" class="link" href="faq.html">FAQ</a>
        <a id="feedbackLink" class="link" href="feedback.html">Suggestions / complaint</a>
      </div>
    </section>

    <footer class="footer">
      <p class="muted"><small>Tip: each QR code can include a product id, e.g. <code>?p=564500</code>.</small></p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
